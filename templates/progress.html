<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress - StudyMate AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div id="loader"></div>

<div id="content">

<header>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <h1>StudyMate AI</h1>

    <nav>
        <a href="{{ url_for('home') }}">Home</a>
<a href="{{ url_for('about') }}">About</a>
<a href="{{ url_for('login') }}">Login</a>
<a href="{{ url_for('signup') }}">Sign Up</a>
<a href="{{ url_for('dashboard') }}">Dashboard</a>
<a href="{{ url_for('notes') }}">My Notes</a>
<a href="{{ url_for('ai_tools') }}">AI Tools</a>
<a href="{{ url_for('progress') }}">Progress</a>
<a href="{{ url_for('contact') }}">Contact</a>
    </nav>
</header>

<section class="progress-page">

    <h2>📈 Learning Progress</h2>
    <p>Track your study performance and achievements.</p>

    <div class="progress-card">

        <h3>Course Completion</h3>

        <div class="progress-bar">
            <div class="progress-fill" style="width: {{ progress }}%;">
                {{ progress }}%
            </div>
        </div>

        <table class="progress-table">
            <tr>
                <th>Activity</th>
                <th>Completed</th>
            </tr>

            <tr>
                <td>Total Notes Added</td>
                <td>{{ total_notes }}</td>
            </tr>

        </table>

    </div>

</section>
<footer>
    <p>© 2026 StudyMate AI. All Rights Reserved.</p>
</footer>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</div>
</body>
</html>
