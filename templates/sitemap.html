<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyMate AI - Sitemap</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f7fc;
            margin:0;
            padding:40px;
        }

        .container{
            max-width:700px;
            margin:auto;
            background:#fff;
            padding:30px;
            border-radius:12px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            color:#4B0082;
        }

        ul{
            list-style:none;
            padding-left:20px;
            font-size:18px;
        }

        li{
            margin:12px 0;
            position:relative;
            padding-left:20px;
        }

        li::before{
            content:"├──";
            position:absolute;
            left:0;
            color:#666;
        }

        .root::before{
            content:"";
        }

        .last::before{
            content:"└──";
        }

        .page{
            color:#333;
            font-weight:500;
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div id="loader"></div>

<div id="content">

<div class="container">

<h1>StudyMate AI Sitemap</h1>

<ul>
    <li class="root"><span class="page">🏠 Home</span>
        <ul>
            <li><span class="page">About</span></li>
            <li><span class="page">Login</span></li>
            <li><span class="page">Sign Up</span></li>
            <li><span class="page">Dashboard</span></li>
            <li><span class="page">My Notes</span></li>
            <li><span class="page">AI Tools</span></li>
            <li><span class="page">Progress</span></li>
            <li class="last"><span class="page">Contact</span></li>
        </ul>
    </li>
</ul>

</div>
<nav>
    <a href="{{ url_for('home') }}">Home</a>
<a href="{{ url_for('about') }}">About</a>
<a href="{{ url_for('login') }}">Login</a>
<a href="{{ url_for('signup') }}">Sign Up</a>
<a href="{{ url_for('dashboard') }}">Dashboard</a>
<a href="{{ url_for('notes') }}">My Notes</a>
<a href="{{ url_for('ai_tools') }}">AI Tools</a>
<a href="{{ url_for('progress') }}">Progress</a>
<a href="{{ url_for('contact') }}">Contact</a>
</nav>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
