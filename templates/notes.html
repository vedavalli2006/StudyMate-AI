<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notes - StudyMate AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div id="loader"></div>

<div id="content">

<header>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <h1>StudyMate AI</h1>

    <nav>
        <a href="{{ url_for('home') }}">Home</a>
<a href="{{ url_for('about') }}">About</a>
<a href="{{ url_for('login') }}">Login</a>
<a href="{{ url_for('signup') }}">Sign Up</a>
<a href="{{ url_for('dashboard') }}">Dashboard</a>
<a href="{{ url_for('notes') }}">My Notes</a>
<a href="{{ url_for('ai_tools') }}">AI Tools</a>
<a href="{{ url_for('progress') }}">Progress</a>
<a href="{{ url_for('contact') }}">Contact</a>
    </nav>
</header>

<section class="notes">

    <h2>My Notes</h2>

    <form method="POST">

        <textarea
            name="note"
            rows="5"
            cols="60"
            placeholder="Write your note here..."
            required>
        </textarea>

        <br><br>

        <button type="submit">💾 Save Note</button>

    </form>

    <hr>

    <h3>Saved Notes</h3>
     {% for note in notes %}

<div class="note-card">

    <p>{{ note[1] }}</p>

    <a href="{{ url_for('delete_note', id=note[0]) }}"
       class="delete-btn">
       🗑 Delete
    </a>

</div>

{% endfor %}
    
</section>

<footer>
    <p>© 2026 StudyMate AI. All Rights Reserved.</p>
</footer>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</div>
</body>
</html>
