<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - StudyMate AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div id="loader"></div>

<div id="content">

<header>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <h1>StudyMate AI</h1>

    <nav>
        <a href="{{ url_for('home') }}">Home</a>
<a href="{{ url_for('about') }}">About</a>
<a href="{{ url_for('login') }}">Login</a>
<a href="{{ url_for('signup') }}">Sign Up</a>
<a href="{{ url_for('dashboard') }}">Dashboard</a>
<a href="{{ url_for('notes') }}">My Notes</a>
<a href="{{ url_for('ai_tools') }}">AI Tools</a>
<a href="{{ url_for('progress') }}">Progress</a>
<a href="{{ url_for('contact') }}">Contact</a>
<a href="{{ url_for('logout') }}">Logout</a>
    </nav>
</header>

<section class="dashboard">

    <h2>Welcome, {{ username }} 👋</h2>

    <div class="stats">

        <div class="card">
            <h3>📝 Total Notes</h3>
            <h1>{{ total_notes }}</h1>
        </div>

        <div class="card">
            <h3>📈 Progress</h3>

            <div class="progress-bar">
                <div class="progress-fill" style="width: {{ progress }}%;">
                    {{ progress }}%
                </div>
            </div>

        </div>

        <div class="card">
            <h3>📚 Study Reminder</h3>
            <p>Study at least <b>30 minutes</b> today.</p>
        </div>

    </div>

</section>

<footer>
    <p>© 2026 StudyMate AI. All Rights Reserved.</p>
</footer>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
